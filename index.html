<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin: 5px;
            font-size: 24px;
        }

        #score {
            margin-bottom: 10px;
            font-size: 18px;
        }

        #game {
            position: relative;
            width: 320px;
            height: 480px;
            background: #111;
            border: 2px solid #0f0;
            overflow: hidden;
            touch-action: none;
        }

        #player {
            position: absolute;
            width: 30px;
            height: 15px;
            background: #0f0;
            border-radius: 3px;
            bottom: 10px;
        }

        .invader {
            position: absolute;
            width: 20px;
            height: 15px;
            background: #0f0;
            border-radius: 3px;
        }

        .bullet {
            position: absolute;
            width: 4px;
            height: 10px;
            background: #0f0;
        }

        #message {
            margin-top: 10px;
            font-size: 24px;
            color: #0f0;
            height: 30px;
        }
    </style>
</head>

<body>

    <h1>Space Invaders</h1>
    <div id="score">Score: 0</div>

    <div id="game">
        <div id="player"></div>
    </div>

    <div id="message"></div>

    <script>
        const game = document.getElementById("game");
        const player = document.getElementById("player");
        const scoreEl = document.getElementById("score");
        const messageEl = document.getElementById("message");

        const GAME_WIDTH = 320;
        const GAME_HEIGHT = 480;

        let score = 0;
        let gameRunning = true;

        let playerX = 145;
        player.style.left = playerX + "px";

        let bullet = null;
        let bulletX = 0;
        let bulletY = 0;
        const bulletSpeed = 8;

        const invaders = [];
        let invaderDirection = 1;
        let invaderSpeed = 1.2;
        const invaderStepDown = 15;

        const rows = 3;
        const cols = 8;

        // Create Invaders
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const el = document.createElement("div");
                el.className = "invader";

                const x = 20 + c * 35;
                const y = 20 + r * 30;

                el.style.left = x + "px";
                el.style.top = y + "px";

                game.appendChild(el);

                invaders.push({
                    el,
                    x,
                    y,
                    width: 20,
                    height: 15
                });
            }
        }

        function movePlayer(x) {
            playerX = Math.max(0, Math.min(GAME_WIDTH - 30, x));
            player.style.left = playerX + "px";
        }

        function shoot() {
            if (!gameRunning || bullet) return;

            bullet = document.createElement("div");
            bullet.className = "bullet";

            bulletX = playerX + 13;
            bulletY = GAME_HEIGHT - 35;

            bullet.style.left = bulletX + "px";
            bullet.style.top = bulletY + "px";

            game.appendChild(bullet);
        }

        function gameOver() {
            gameRunning = false;
            messageEl.textContent = "GAME OVER";
        }

        function winGame() {
            gameRunning = false;
            messageEl.textContent = "YOU WIN!";
        }

        // Keyboard controls
        window.addEventListener("keydown", e => {
            if (!gameRunning) return;

            switch (e.key) {
                case "ArrowLeft":
                    movePlayer(playerX - 15);
                    break;
                case "ArrowRight":
                    movePlayer(playerX + 15);
                    break;
                case " ":
                case "Spacebar":
                    e.preventDefault();
                    shoot();
                    break;
            }
        });

        // Click to shoot
        game.addEventListener("click", shoot);

        // Touch controls
        game.addEventListener("touchmove", e => {
            const rect = game.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left - 15;
            movePlayer(x);
        });

        game.addEventListener("touchend", shoot);

        function updateBullet() {
            if (!bullet) return;

            bulletY -= bulletSpeed;

            if (bulletY < 0) {
                bullet.remove();
                bullet = null;
                return;
            }

            bullet.style.top = bulletY + "px";

            for (let i = invaders.length - 1; i >= 0; i--) {
                const inv = invaders[i];

                const hit =
                    bulletX >= inv.x &&
                    bulletX <= inv.x + inv.width &&
                    bulletY <= inv.y + inv.height &&
                    bulletY + 10 >= inv.y;

                if (hit) {
                    inv.el.remove();
                    invaders.splice(i, 1);

                    bullet.remove();
                    bullet = null;

                    score += 10;
                    scoreEl.textContent = "Score: " + score;

                    if (invaders.length === 0) {
                        winGame();
                    }

                    break;
                }
            }
        }

        function updateInvaders() {
            let edgeHit = false;

            for (const inv of invaders) {
                const nextX = inv.x + invaderSpeed * invaderDirection;

                if (nextX <= 0 || nextX >= GAME_WIDTH - inv.width) {
                    edgeHit = true;
                    break;
                }
            }

            if (edgeHit) {
                invaderDirection *= -1;

                for (const inv of invaders) {
                    inv.y += invaderStepDown;

                    if (inv.y + inv.height >= GAME_HEIGHT - 40) {
                        gameOver();
                        return;
                    }
                }
            }

            for (const inv of invaders) {
                inv.x += invaderSpeed * invaderDirection;
                inv.el.style.left = inv.x + "px";
                inv.el.style.top = inv.y + "px";
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            updateInvaders();
            updateBullet();

            requestAnimationFrame(gameLoop);
        }

        // Run
        gameLoop();
    </script>

</body>

</html>
